<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            flex-direction:column;
            background:#f4f4f4;
        }

        /* Navbar */
        nav{
            background:#2c3e50;
            color:white;
            padding:15px 30px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav h2{
            font-size:24px;
        }

        nav ul{
            list-style:none;
            display:flex;
            gap:20px;
        }

        nav ul li a{
            text-decoration:none;
            color:white;
            font-weight:bold;
        }

        nav ul li a:hover{
            color:#f1c40f;
        }

        /* Main Section */
        .container{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .calculator{
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
            width:350px;
        }

        .calculator h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:16px;
        }

        .buttons{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:10px;
            margin-top:15px;
        }

        button{
            padding:12px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:18px;
            color:white;
        }

        .add{
            background:#27ae60;
        }

        .sub{
            background:#e74c3c;
        }

        .mul{
            background:#3498db;
        }

        .div{
            background:#f39c12;
        }

        button:hover{
            opacity:0.9;
        }

        .result{
            margin-top:20px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
            color:#2c3e50;
        }

        /* Footer */
        footer{
            background:#2c3e50;
            color:white;
            text-align:center;
            padding:15px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <h2>My Calculator</h2>
    </nav>

    <!-- Calculator -->
    <div class="container">
        <div class="calculator">
            <h2>Simple Calculator</h2>

            <input type="number" id="num1" placeholder="Enter First Number">
            <input type="number" id="num2" placeholder="Enter Second Number">

            <div class="buttons">
                <button class="add" onclick="add()">+</button>
                <button class="sub" onclick="subtract()">−</button>
                <button class="mul" onclick="multiply()">×</button>
                <button class="div" onclick="divide()">÷</button>
            </div>

            <div class="result" id="result">
                Result: 0
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p> 2026 Calculator Project </p>
    </footer>

    <script>
        function getValues() {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);

            if (isNaN(num1) || isNaN(num2)) {
                alert("Please enter both numbers");
                return null;
            }

            return { num1, num2 };
        }

        function add() {
            let values = getValues();
            if (!values) return;

            document.getElementById("result").innerHTML =
                "Result: " + (values.num1 + values.num2);
        }

        function subtract() {
            let values = getValues();
            if (!values) return;

            document.getElementById("result").innerHTML =
                "Result: " + (values.num1 - values.num2);
        }

        function multiply() {
            let values = getValues();
            if (!values) return;

            document.getElementById("result").innerHTML =
                "Result: " + (values.num1 * values.num2);
        }

        function divide() {
            let values = getValues();
            if (!values) return;

            if (values.num2 === 0) {
                document.getElementById("result").innerHTML =
                    "Cannot divide by zero";
                return;
            }

            document.getElementById("result").innerHTML =
                "Result: " + (values.num1 / values.num2);
        }
    </script>

</body>
</html>
